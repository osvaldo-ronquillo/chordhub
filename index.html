<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChordHub.top</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-straight/css/uicons-regular-straight.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --text: #f5f5f5;
            --text-muted: #999;
            --border: #333;
            --accent: #C686D1;
            --chord-major: #471EC5;
            --chord-minor: #7c3aed;
            --chord-seventh: #06b6d4;
            --chord-dim: #ef4444;
            --chord-aug: #f59e0b;
            --chord-sus: #10b981;
        }

        body.light {
            --bg: #fafafa;
            --bg-secondary: #ffffff;
            --text: #1a1a1a;
            --text-muted: #666;
            --border: #e5e5e5;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            gap: 0;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                width: 280px;
                transform: translateX(-100%);
                transition: transform 0.3s;
                z-index: 1000;
                box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main {
                grid-column: 1;
            }
        }

        .sidebar {
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .sidebar-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: background-color 0.2s;
            font-size: 20px;
        }

        .icon-btn:hover {
            background-color: var(--border);
        }

        .sidebar-controls {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 6px;
        }

        .sort-select {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--bg);
            color: var(--text);
            font-size: 11px;
            cursor: pointer;
        }

        .search-box {
            padding: 10px 12px;
            margin: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background-color: var(--bg);
            color: var(--text);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .songs-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .tag-group {
            margin-bottom: 12px;
        }

        .tag-header {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 8px 12px 4px 12px;
            letter-spacing: 0.5px;
        }

        .song-item {
            padding: 10px 12px;
            margin: 2px 0;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            word-break: break-word;
        }

        .song-item:hover {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .song-item.active {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            font-weight: 600;
        }

        .song-item-title {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .song-item-artist {
            font-size: 10px;
            opacity: 0.8;
        }

        .btn-new {
            margin: 8px;
            padding: 10px 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-new:hover {
            opacity: 0.9;
        }

        .main {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            display: none;
        }

        @media (max-width: 768px) {
            .topbar {
                background-color: var(--bg-secondary);
                border-bottom: 1px solid var(--border);
                padding: 8px 12px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
            }
            .topbar-title {
                display: block;
                font-size: 14px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
        }

        .topbar-controls {
            display: none;
        }

        .bottom-controls {
            position: fixed;
            bottom: 0;
            left: 280px;
            right: 0;
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 800;
        }

        .bottom-controls.hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .bottom-controls {
                left: 0;
            }
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px;
        }

        .control-group input {
            width: 40px;
            border: none;
            background: none;
            text-align: center;
            color: var(--text);
            font-size: 11px;
        }

        .control-icon {
            font-size: 14px;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-toggle {
            display: none;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }
            .topbar {
                padding: 10px 12px;
            }
            .topbar-title {
                font-size: 14px;
            }
            .topbar-controls {
                gap: 6px;
            }
            .control-group {
                padding: 3px;
            }
        }

        .tabs {
            display: flex;
            gap: 0;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            background-color: var(--bg-secondary);
        }

        .tab {
            padding: 12px 16px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .content {
            flex: 1;
            display: flex;
        }

        .view {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .view.active {
            display: flex;
        }

        .reader-content {
            padding: 24px;
            padding-bottom: 90px;
            flex: 1;
        }

        .song-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .song-artist {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .filters-bar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .filter-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-right: 4px;
        }

        .filter-btn {
            padding: 6px 12px;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
            white-space: nowrap;
            color: var(--text);
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-btn.active {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .song-content {
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 16px;
        }

        .chord {
            font-weight: 600;
            padding: 2px 4px;
            border-radius: 3px;
            display: inline-block;
            margin: 0 2px;
        }

        .chord.major {
            color: #fff;
            background-color: var(--chord-major);
        }

        .chord.minor {
            color: #fff;
            background-color: var(--chord-minor);
        }

        .chord.seventh {
            color: #fff;
            background-color: var(--chord-seventh);
        }

        .chord.dim {
            color: #fff;
            background-color: var(--chord-dim);
        }

        .chord.aug {
            color: #000;
            background-color: var(--chord-aug);
        }

        .chord.sus {
            color: #fff;
            background-color: var(--chord-sus);
        }

        .editor-view {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .form-group textarea {
            flex: 1;
            resize: none;
            min-height: 350px;
        }

        .editor-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            flex-direction: column;
            gap: 16px;
            color: var(--text-muted);
            text-align: center;
            padding: 24px;
        }

        @media (max-width: 768px) {
            .reader-content {
                padding: 16px;
            }
            .song-title {
                font-size: 20px;
            }
            .song-content {
                font-size: 14px;
            }
            .tabs {
                padding: 0;
            }
            .tab {
                flex: 1;
                text-align: center;
                padding: 10px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">ChordHub</div>
                <button class="icon-btn" id="toggleDark" title="Modo oscuro">
                    <span class="material-symbols-rounded">dark_mode</span>
                </button>
            </div>

            <div class="sidebar-controls">
                <select class="sort-select" id="sortSelect">
                    <option value="title">Por título</option>
                    <option value="artist">Por artista</option>
                </select>
            </div>

            <input type="text" class="search-box" id="searchBox" placeholder="Buscar...">
            
            <button class="btn-new" id="btnNew">
                <span class="material-symbols-rounded" style="font-size: 16px;">add</span>
                Nueva
            </button>

            <div class="songs-list" id="songsList"></div>
        </div>

        <div class="main">
            <div class="topbar">
                <button class="icon-btn menu-toggle" id="menuToggle">
                    <span class="material-symbols-rounded">menu</span>
                </button>
                <div class="topbar-title">ChordHub</div>
            </div>

            <div class="tabs" id="tabsContainer" style="display: none;">
                <button class="tab active" data-view="reader">
                    <span class="material-symbols-rounded" style="font-size: 18px;">library_books</span>
                    Lectura
                </button>
                <button class="tab" data-view="editor">
                    <span class="material-symbols-rounded" style="font-size: 18px;">edit</span>
                    Editar
                </button>
            </div>

            <div class="content">
                <div class="view reader active" id="readerView">
                    <div class="filters-bar" id="filtersBar"></div>
                    <div class="reader-content" id="readerContent">
                        <div class="empty-state">
                            <span class="material-symbols-rounded" style="font-size: 48px; opacity: 0.3;">library_books</span>
                            <div>Selecciona una canción</div>
                        </div>
                    </div>
                </div>

                <div class="view editor" id="editorView">
                    <div class="editor-view" id="editorContent">
                        <div class="empty-state">
                            <span class="material-symbols-rounded" style="font-size: 48px; opacity: 0.3;">edit</span>
                            <div>Selecciona una canción</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-controls hidden" id="bottomControls">
                <div class="control-group">
                    <button class="icon-btn" id="decreaseFont" style="width: 28px; height: 28px; font-size: 14px;">−</button>
                    <i class="fi fi-rs-text-size control-icon"></i>
                    <input type="number" id="fontSize" min="12" max="48" value="16">
                    <button class="icon-btn" id="increaseFont" style="width: 28px; height: 28px; font-size: 14px;">+</button>
                </div>
                <div class="control-group">
                    <button class="icon-btn" id="decreaseLineHeight" style="width: 28px; height: 28px; font-size: 14px;">−</button>
                    <i class="fi fi-rs-interlining control-icon"></i>
                    <input type="number" id="lineHeight" min="1.0" max="2.5" step="0.1" value="1.8">
                    <button class="icon-btn" id="increaseLineHeight" style="width: 28px; height: 28px; font-size: 14px;">+</button>
                </div>
                <div class="control-group">
                    <button class="icon-btn" id="autoScrollToggle" style="width: 28px; height: 28px;" title="Auto scroll">
                        <span class="material-symbols-rounded" style="font-size: 18px;" id="autoScrollIcon">play_arrow</span>
                    </button>
                    <button class="icon-btn" id="decreaseScrollSpeed" style="width: 28px; height: 28px; font-size: 14px;">−</button>
                    <input type="number" id="scrollSpeed" min="1" max="10" value="3" style="width: 30px;">
                    <button class="icon-btn" id="increaseScrollSpeed" style="width: 28px; height: 28px; font-size: 14px;">+</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, push } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgoJySUxHaIe2uMKAILFIlO6AL8_7LgNM",
            authDomain: "jamcloud-84fd8.firebaseapp.com",
            projectId: "jamcloud-84fd8",
            storageBucket: "jamcloud-84fd8.firebasestorage.app",
            messagingSenderId: "590743819200",
            appId: "1:590743819200:web:feeaa689b979932b4f6e25",
            databaseURL: "https://jamcloud-84fd8-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const state = {
            songs: [],
            currentSongId: null,
            fontSize: 16,
            lineHeight: 1.8,
            darkMode: localStorage.getItem('darkMode') !== 'false',
            filteredArtist: null,
            filteredTag: null,
            sortBy: 'title',
            mobileMenuOpen: false
        };

        const CHORD_PATTERN = /^(Do|Re|Mi|Fa|Sol|La|Si|[A-G])(?:[#b])?(?:m|M|maj|maj7|m7|7|m7b5|dim|aug|\+|sus[24]|add\d+)?$/;

        function getChordType(chord) {
            const lower = chord.toLowerCase();
            if (/dim/.test(lower)) return 'dim';
            if (/aug|\+/.test(lower)) return 'aug';
            if (/sus[24]/.test(lower)) return 'sus';
            if (/7|9|11|13|maj|m(?!aj)/.test(lower)) return 'seventh';
            if (/m|min/.test(lower)) return 'minor';
            return 'major';
        }

        function isChordLine(line) {
            const trimmed = line.trim();
            if (!trimmed || trimmed.length === 0) return false;
            const words = trimmed.split(/\s{2,}|\s*\n/);
            return words.length > 0 && words.every(word => {
                const w = word.trim();
                return w === '' || CHORD_PATTERN.test(w) || w.match(/^\[.*\]$/);
            });
        }

        function highlightChords(text) {
            return text.split('\n').map(line => {
                if (isChordLine(line)) {
                    const trimmed = line.trim();
                    const leadingSpace = line.match(/^(\s*)/)[0];
                    const words = trimmed.split(/\s{2,}/);
                    const highlighted = words.map((word, idx) => {
                        if (word.trim() === '') return word;
                        if (CHORD_PATTERN.test(word.trim())) {
                            const type = getChordType(word.trim());
                            return `<span class="chord ${type}">${word}</span>`;
                        }
                        return word;
                    }).join('  ');
                    return leadingSpace + highlighted;
                }
                return line;
            }).join('\n');
        }

        function loadSongs() {
            const songsRef = ref(db, 'songs');
            onValue(songsRef, (snapshot) => {
                state.songs = [];
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        state.songs.push({
                            id: child.key,
                            ...child.val()
                        });
                    });
                }
                const sortMap = {
                    title: (a, b) => (a.title || '').localeCompare(b.title || ''),
                    artist: (a, b) => (a.artist || '').localeCompare(b.artist || '') || (a.title || '').localeCompare(b.title || '')
                };
                state.songs.sort(sortMap[state.sortBy] || sortMap.title);
                renderSongsList();
            });
        }

        function groupBytags(songs) {
            const grouped = { 'Sin etiqueta': [] };
            songs.forEach(song => {
                const tags = (song.tags || []).length > 0 ? song.tags : ['Sin etiqueta'];
                tags.forEach(tag => {
                    if (!grouped[tag]) grouped[tag] = [];
                    if (!grouped[tag].find(s => s.id === song.id)) {
                        grouped[tag].push(song);
                    }
                });
            });
            return grouped;
        }

        function renderSongsList(filtered = null) {
            const list = document.getElementById('songsList');
            list.innerHTML = '';
            const toShow = filtered || state.songs;
            
            if (toShow.length === 0) {
                list.innerHTML = '<div style="padding: 16px; text-align: center; color: var(--text-muted); font-size: 12px;">Sin canciones</div>';
                return;
            }

            const grouped = groupBytags(toShow);
            
            Object.entries(grouped).forEach(([tag, songs]) => {
                if (songs.length === 0) return;
                
                const tagEl = document.createElement('div');
                tagEl.className = 'tag-group';
                
                const header = document.createElement('div');
                header.className = 'tag-header';
                header.textContent = tag;
                tagEl.appendChild(header);
                
                songs.forEach(song => {
                    const el = document.createElement('div');
                    el.className = 'song-item' + (song.id === state.currentSongId ? ' active' : '');
                    el.innerHTML = `
                        <div class="song-item-title">${song.title || 'Sin título'}</div>
                        <div class="song-item-artist">${song.artist || ''}</div>
                    `;
                    el.onclick = () => {
                        selectSong(song.id);
                        closeMobileMenu();
                    };
                    tagEl.appendChild(el);
                });
                
                list.appendChild(tagEl);
            });
        }

        function selectSong(id) {
            state.currentSongId = id;
            state.filteredArtist = null;
            state.filteredTag = null;
            renderSongsList();
            renderReaderAndEditor();
        }

        function renderReaderAndEditor() {
            const song = state.songs.find(s => s.id === state.currentSongId);
            
            if (!song) {
                document.getElementById('readerContent').innerHTML = '<div class="empty-state"><span class="material-symbols-rounded" style="font-size: 48px; opacity: 0.3;">library_books</span><div>Selecciona una canción</div></div>';
                document.getElementById('editorContent').innerHTML = '<div class="empty-state"><span class="material-symbols-rounded" style="font-size: 48px; opacity: 0.3;">edit</span><div>Selecciona una canción</div></div>';
                document.getElementById('tabsContainer').style.display = 'none';
                document.getElementById('bottomControls').classList.add('hidden');
                document.getElementById('filtersBar').innerHTML = '';
                return;
            }

            document.getElementById('tabsContainer').style.display = 'flex';
            document.getElementById('bottomControls').classList.remove('hidden');

            const artists = [...new Set(state.songs.map(s => s.artist).filter(Boolean))];
            const tags = [...new Set(state.songs.flatMap(s => (s.tags || []) || []))];
            
            let filtersHtml = '<div class="filter-group"><span class="filter-label">Artista:</span>';
            artists.forEach(artist => {
                filtersHtml += `<button class="filter-btn ${state.filteredArtist === artist ? 'active' : ''}" data-filter-artist="${artist}">${artist}</button>`;
            });
            filtersHtml += '</div>';

            if (tags.length > 0) {
                filtersHtml += '<div class="filter-group"><span class="filter-label">Etiquetas:</span>';
                tags.forEach(tag => {
                    filtersHtml += `<button class="filter-btn ${state.filteredTag === tag ? 'active' : ''}" data-filter-tag="${tag}">#${tag}</button>`;
                });
                filtersHtml += '</div>';
            }

            document.getElementById('filtersBar').innerHTML = filtersHtml;

            document.querySelectorAll('[data-filter-artist]').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    state.filteredArtist = state.filteredArtist === btn.dataset.filterArtist ? null : btn.dataset.filterArtist;
                    renderSongsList(state.filteredArtist ? state.songs.filter(s => s.artist === state.filteredArtist) : null);
                    renderReaderAndEditor();
                };
            });

            document.querySelectorAll('[data-filter-tag]').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    state.filteredTag = state.filteredTag === btn.dataset.filterTag ? null : btn.dataset.filterTag;
                    const filtered = state.filteredTag ? state.songs.filter(s => (s.tags || []).includes(state.filteredTag)) : null;
                    renderSongsList(filtered);
                    renderReaderAndEditor();
                };
            });

            const readerContent = document.getElementById('readerContent');
            readerContent.innerHTML = `
                <div class="song-title">${song.title || 'Sin título'}</div>
                <div class="song-artist">${song.artist || ''}</div>
                <div class="song-content" style="font-size: ${state.fontSize}px; line-height: ${state.lineHeight};">${highlightChords(song.content || '')}</div>
            `;

            const editorContent = document.getElementById('editorContent');
            editorContent.innerHTML = `
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="inputTitle" value="${song.title || ''}" placeholder="Título">
                </div>
                <div class="form-group">
                    <label>Artista</label>
                    <input type="text" id="inputArtist" value="${song.artist || ''}" placeholder="Artista">
                </div>
                <div class="form-group">
                    <label>Etiquetas (separadas por comas)</label>
                    <input type="text" id="inputTags" value="${(song.tags || []).join(', ')}" placeholder="tag1, tag2">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Contenido</label>
                    <textarea id="inputContent" placeholder="Letra con acordes...">${song.content || ''}</textarea>
                </div>
                <div class="editor-buttons">
                    <button class="btn btn-primary" id="btnSave">
                        <span class="material-symbols-rounded" style="font-size: 16px;">save</span>
                        Guardar
                    </button>
                    <button class="btn btn-danger" id="btnDelete">
                        <span class="material-symbols-rounded" style="font-size: 16px;">delete</span>
                        Eliminar
                    </button>
                </div>
            `;

            document.getElementById('btnSave').onclick = () => saveSong(song.id);
            document.getElementById('btnDelete').onclick = () => deleteSong(song.id);
        }

        function saveSong(id) {
            const title = document.getElementById('inputTitle').value || 'Sin título';
            const artist = document.getElementById('inputArtist').value || '';
            const content = document.getElementById('inputContent').value || '';
            const tags = document.getElementById('inputTags').value
                .split(',')
                .map(t => t.trim())
                .filter(Boolean);

            set(ref(db, `songs/${id}`), {
                title,
                artist,
                content,
                tags,
                updatedAt: new Date().toISOString()
            });

            renderReaderAndEditor();
        }

        function deleteSong(id) {
            if (confirm('Eliminar esta canción?')) {
                remove(ref(db, `songs/${id}`));
                state.currentSongId = null;
                renderReaderAndEditor();
            }
        }

        function newSong() {
            const newRef = push(ref(db, 'songs'));
            set(newRef, {
                title: 'Nueva canción',
                artist: '',
                content: 'INTRO\n\n',
                tags: [],
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            }).then(() => {
                selectSong(newRef.key);
            });
        }

        function closeMobileMenu() {
            state.mobileMenuOpen = false;
            document.getElementById('sidebar').classList.remove('open');
        }

        document.getElementById('toggleDark').onclick = () => {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('light', !state.darkMode);
            localStorage.setItem('darkMode', state.darkMode);
        };

        document.getElementById('menuToggle').onclick = () => {
            state.mobileMenuOpen = !state.mobileMenuOpen;
            document.getElementById('sidebar').classList.toggle('open');
        };

        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.getElementById('menuToggle');
            if (state.mobileMenuOpen && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                closeMobileMenu();
            }
        });

        document.getElementById('btnNew').onclick = newSong;

        document.getElementById('searchBox').oninput = (e) => {
            const query = e.target.value.toLowerCase();
            if (query.length > 0) {
                const filtered = state.songs.filter(s =>
                    (s.title || '').toLowerCase().includes(query) ||
                    (s.artist || '').toLowerCase().includes(query)
                );
                renderSongsList(filtered);
            } else {
                renderSongsList();
            }
        };

        document.getElementById('sortSelect').onchange = (e) => {
            state.sortBy = e.target.value;
            loadSongs();
        };

        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(tab.dataset.view + 'View').classList.add('active');
                closeMobileMenu();
            };
        });

        document.getElementById('decreaseFont').onclick = () => {
            state.fontSize = Math.max(12, state.fontSize - 1);
            document.getElementById('fontSize').value = state.fontSize;
            renderReaderAndEditor();
        };

        document.getElementById('increaseFont').onclick = () => {
            state.fontSize = Math.min(48, state.fontSize + 1);
            document.getElementById('fontSize').value = state.fontSize;
            renderReaderAndEditor();
        };

        document.getElementById('fontSize').oninput = (e) => {
            state.fontSize = Math.max(12, Math.min(48, parseInt(e.target.value) || 16));
            renderReaderAndEditor();
        };

        document.getElementById('decreaseLineHeight').onclick = () => {
            state.lineHeight = Math.max(1.0, state.lineHeight - 0.1);
            state.lineHeight = Math.round(state.lineHeight * 10) / 10;
            document.getElementById('lineHeight').value = state.lineHeight;
            renderReaderAndEditor();
        };

        document.getElementById('increaseLineHeight').onclick = () => {
            state.lineHeight = Math.min(2.5, state.lineHeight + 0.1);
            state.lineHeight = Math.round(state.lineHeight * 10) / 10;
            document.getElementById('lineHeight').value = state.lineHeight;
            renderReaderAndEditor();
        };

        document.getElementById('lineHeight').oninput = (e) => {
            state.lineHeight = Math.max(1.0, Math.min(2.5, parseFloat(e.target.value) || 1.8));
            renderReaderAndEditor();
        };

        // AUTO SCROLL
        let autoScrollInterval = null;
        let scrollSpeed = 3;
        const mainEl = document.querySelector('.main');

        function stopAutoScroll() {
            if (autoScrollInterval) {
                clearInterval(autoScrollInterval);
                autoScrollInterval = null;
                document.getElementById('autoScrollIcon').textContent = 'play_arrow';
            }
        }

        function startAutoScroll() {
            autoScrollInterval = setInterval(() => {
                mainEl.scrollTop += 1;
                if (mainEl.scrollTop + mainEl.clientHeight >= mainEl.scrollHeight) {
                    stopAutoScroll();
                }
            }, 110 - scrollSpeed * 10);
            document.getElementById('autoScrollIcon').textContent = 'pause';
        }

        document.getElementById('autoScrollToggle').onclick = () => {
            if (autoScrollInterval) {
                stopAutoScroll();
            } else {
                startAutoScroll();
            }
        };

        document.getElementById('decreaseScrollSpeed').onclick = () => {
            scrollSpeed = Math.max(1, scrollSpeed - 1);
            document.getElementById('scrollSpeed').value = scrollSpeed;
            if (autoScrollInterval) { stopAutoScroll(); startAutoScroll(); }
        };

        document.getElementById('increaseScrollSpeed').onclick = () => {
            scrollSpeed = Math.min(10, scrollSpeed + 1);
            document.getElementById('scrollSpeed').value = scrollSpeed;
            if (autoScrollInterval) { stopAutoScroll(); startAutoScroll(); }
        };

        document.getElementById('scrollSpeed').oninput = (e) => {
            scrollSpeed = Math.max(1, Math.min(10, parseInt(e.target.value) || 3));
            if (autoScrollInterval) { stopAutoScroll(); startAutoScroll(); }
        };

        if (!state.darkMode) {
            document.body.classList.add('light');
        }

        loadSongs();
    </script>
</body>
</html>
