<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancionero</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafafa;
            --bg-secondary: #ffffff;
            --text: #1a1a1a;
            --text-muted: #666;
            --border: #e5e5e5;
            --accent: #C686D1;
            --chord-major: #471EC5;
            --chord-minor: #7c3aed;
            --chord-seventh: #06b6d4;
            --chord-dim: #ef4444;
            --chord-aug: #f59e0b;
            --chord-sus: #10b981;
        }

        body.dark {
            --bg: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --text: #f5f5f5;
            --text-muted: #999;
            --border: #333;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            gap: 0;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            .sidebar {
                grid-column: 1;
                grid-row: 1;
                max-height: 35vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .main {
                grid-column: 1;
                grid-row: 2;
            }
        }

        .sidebar {
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: background-color 0.2s;
            font-size: 20px;
            padding: 0;
        }

        .icon-btn:hover {
            background-color: var(--border);
        }

        .search-box {
            padding: 10px 12px;
            margin: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background-color: var(--bg);
            color: var(--text);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .search-suggestions {
            display: none;
            position: absolute;
            top: calc(100% + 2px);
            left: 8px;
            right: 8px;
            max-height: 200px;
            overflow-y: auto;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            z-index: 1000;
        }

        .search-suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion-item:hover {
            background-color: var(--border);
        }

        .suggestion-type {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .songs-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .song-item {
            padding: 10px 12px;
            margin: 4px 0;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            word-break: break-word;
        }

        .song-item:hover {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .song-item.active {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            font-weight: 600;
        }

        .song-item-title {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .song-item-artist {
            font-size: 11px;
            opacity: 0.7;
        }

        .btn-new {
            margin: 8px;
            padding: 10px 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-new:hover {
            opacity: 0.9;
        }

        .main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .topbar-title {
            font-size: 16px;
            font-weight: 600;
        }

        .topbar-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .font-control {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px;
        }

        .font-control input {
            width: 35px;
            border: none;
            background: none;
            text-align: center;
            color: var(--text);
            font-size: 12px;
        }

        .tabs {
            display: flex;
            gap: 0;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            background-color: var(--bg-secondary);
        }

        .tab {
            padding: 12px 16px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .content {
            flex: 1;
            overflow: hidden;
            display: flex;
        }

        .view {
            display: none;
            flex: 1;
            overflow-y: auto;
            flex-direction: column;
        }

        .view.active {
            display: flex;
        }

        .reader-content {
            padding: 24px;
            flex: 1;
            overflow-y: auto;
        }

        .song-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .song-artist {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .filters-bar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .filter-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-right: 4px;
        }

        .filter-btn {
            padding: 6px 12px;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-btn.active {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .song-content {
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.8;
            font-size: 16px;
        }

        .chord {
            font-weight: 600;
            padding: 2px 4px;
            border-radius: 3px;
            display: inline-block;
            margin: 0 2px;
        }

        .chord.major {
            color: #fff;
            background-color: var(--chord-major);
        }

        .chord.minor {
            color: #fff;
            background-color: var(--chord-minor);
        }

        .chord.seventh {
            color: #fff;
            background-color: var(--chord-seventh);
        }

        .chord.dim {
            color: #fff;
            background-color: var(--chord-dim);
        }

        .chord.aug {
            color: #000;
            background-color: var(--chord-aug);
        }

        .chord.sus {
            color: #fff;
            background-color: var(--chord-sus);
        }

        .editor-view {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .form-group textarea {
            flex: 1;
            resize: none;
            min-height: 350px;
        }

        .editor-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
        }

        .btn-secondary {
            background-color: var(--border);
            color: var(--text);
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            flex-direction: column;
            gap: 16px;
            color: var(--text-muted);
            text-align: center;
            padding: 24px;
        }

        .empty-state-icon {
            font-size: 48px;
        }

        @media (max-width: 768px) {
            .reader-content {
                padding: 16px;
            }

            .song-title {
                font-size: 20px;
            }

            .tabs {
                padding: 0;
            }

            .tab {
                flex: 1;
                text-align: center;
                padding: 12px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Cancionero</div>
                <button class="icon-btn" id="toggleDark" title="Modo oscuro">
                    <span class="material-symbols-rounded">dark_mode</span>
                </button>
            </div>

            <div style="position: relative; padding: 8px;">
                <input type="text" class="search-box" id="searchBox" placeholder="Buscar canciones...">
                <div class="search-suggestions" id="searchSuggestions"></div>
            </div>

            <button class="btn-new" id="btnNew">
                <span class="material-symbols-rounded" style="font-size: 18px;">add</span>
                Nueva canción
            </button>

            <div class="songs-list" id="songsList"></div>
        </div>

        <div class="main">
            <div class="topbar">
                <div class="topbar-title" id="topbarTitle">Cancionero</div>
                <div class="topbar-controls" id="topbarControls" style="display: none;">
                    <div class="font-control">
                        <button class="icon-btn" id="decreaseFont" style="width: 28px; height: 28px; font-size: 16px;">−</button>
                        <input type="number" id="fontSize" min="12" max="48" value="16">
                        <span style="font-size: 11px; color: var(--text-muted); min-width: 18px;">px</span>
                        <button class="icon-btn" id="increaseFont" style="width: 28px; height: 28px; font-size: 16px;">+</button>
                    </div>
                </div>
            </div>

            <div class="tabs" id="tabsContainer" style="display: none;">
                <button class="tab active" data-view="reader">
                    <span class="material-symbols-rounded" style="font-size: 18px;">library_books</span>
                    Lectura
                </button>
                <button class="tab" data-view="editor">
                    <span class="material-symbols-rounded" style="font-size: 18px;">edit</span>
                    Editar
                </button>
            </div>

            <div class="content">
                <div class="view reader active" id="readerView">
                    <div class="filters-bar" id="filtersBar"></div>
                    <div class="reader-content" id="readerContent">
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <span class="material-symbols-rounded" style="font-size: 48px;">library_books</span>
                            </div>
                            <div>Selecciona una canción para leer</div>
                        </div>
                    </div>
                </div>

                <div class="view editor" id="editorView">
                    <div class="editor-view" id="editorContent">
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <span class="material-symbols-rounded" style="font-size: 48px;">edit</span>
                            </div>
                            <div>Selecciona una canción para editar</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, push } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgoJySUxHaIe2uMKAILFIlO6AL8_7LgNM",
            authDomain: "jamcloud-84fd8.firebaseapp.com",
            projectId: "jamcloud-84fd8",
            storageBucket: "jamcloud-84fd8.firebasestorage.app",
            messagingSenderId: "590743819200",
            appId: "1:590743819200:web:feeaa689b979932b4f6e25",
            databaseURL: "https://jamcloud-84fd8-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        console.log("Firebase inicializado");

        const state = {
            songs: [],
            currentSongId: null,
            fontSize: 16,
            darkMode: localStorage.getItem('darkMode') === 'true',
            filteredArtist: null,
            filteredTag: null
        };

        const CHORD_PATTERN = /^(Do|Re|Mi|Fa|Sol|La|Si|[A-G])(?:[#b])?(?:m|M|maj|maj7|m7|7|m7b5|dim|aug|\+|sus[24]|add\d+)?$/;

        function getChordType(chord) {
            const lower = chord.toLowerCase();
            if (/dim/.test(lower)) return 'dim';
            if (/aug|\+/.test(lower)) return 'aug';
            if (/sus[24]/.test(lower)) return 'sus';
            if (/7|9|11|13|maj|m(?!aj)/.test(lower)) return 'seventh';
            if (/m|min/.test(lower)) return 'minor';
            return 'major';
        }

        function highlightChords(text) {
            return text.split('\n').map(line => {
                const words = line.split(/(\s+)/);
                return words.map(word => {
                    if (CHORD_PATTERN.test(word.trim())) {
                        const trimmed = word.trim();
                        const type = getChordType(trimmed);
                        const ws = word.match(/^\s*/)[0];
                        const wsEnd = word.match(/\s*$/)[0];
                        return ws + `<span class="chord ${type}">${trimmed}</span>` + wsEnd;
                    }
                    return word;
                }).join('');
            }).join('\n');
        }

        function loadSongs() {
            const songsRef = ref(db, 'songs');
            onValue(songsRef, (snapshot) => {
                state.songs = [];
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        state.songs.push({
                            id: child.key,
                            ...child.val()
                        });
                    });
                }
                state.songs.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
                renderSongsList();
            });
        }

        function renderSongsList(filtered = null) {
            const list = document.getElementById('songsList');
            list.innerHTML = '';
            const toShow = filtered || state.songs;
            
            if (toShow.length === 0) {
                list.innerHTML = '<div style="padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px;">Sin canciones</div>';
                return;
            }

            toShow.forEach(song => {
                const el = document.createElement('div');
                el.className = 'song-item' + (song.id === state.currentSongId ? ' active' : '');
                el.innerHTML = `
                    <div class="song-item-title">${song.title || 'Sin título'}</div>
                    <div class="song-item-artist">${song.artist || 'Sin artista'}</div>
                `;
                el.onclick = () => selectSong(song.id);
                list.appendChild(el);
            });
        }

        function selectSong(id) {
            state.currentSongId = id;
            state.filteredArtist = null;
            state.filteredTag = null;
            renderSongsList();
            renderReaderAndEditor();
        }

        function renderReaderAndEditor() {
            const song = state.songs.find(s => s.id === state.currentSongId);
            
            if (!song) {
                document.getElementById('readerContent').innerHTML = '<div class="empty-state"><div class="empty-state-icon"><span class="material-symbols-rounded">library_books</span></div><div>Selecciona una canción</div></div>';
                document.getElementById('editorContent').innerHTML = '<div class="empty-state"><div class="empty-state-icon"><span class="material-symbols-rounded">edit</span></div><div>Selecciona una canción</div></div>';
                document.getElementById('tabsContainer').style.display = 'none';
                document.getElementById('topbarControls').style.display = 'none';
                document.getElementById('filtersBar').innerHTML = '';
                return;
            }

            document.getElementById('topbarTitle').textContent = song.title || 'Sin título';
            document.getElementById('tabsContainer').style.display = 'flex';
            document.getElementById('topbarControls').style.display = 'flex';

            const artists = [...new Set(state.songs.map(s => s.artist).filter(Boolean))];
            const tags = [...new Set(state.songs.flatMap(s => (s.tags || [])))];
            
            let filtersHtml = '<div class="filter-group"><span class="filter-label">Artista:</span>';
            artists.forEach(artist => {
                filtersHtml += `<button class="filter-btn ${state.filteredArtist === artist ? 'active' : ''}" data-filter-artist="${artist}">${artist}</button>`;
            });
            filtersHtml += '</div>';

            if (tags.length > 0) {
                filtersHtml += '<div class="filter-group"><span class="filter-label">Etiquetas:</span>';
                tags.forEach(tag => {
                    filtersHtml += `<button class="filter-btn ${state.filteredTag === tag ? 'active' : ''}" data-filter-tag="${tag}">#${tag}</button>`;
                });
                filtersHtml += '</div>';
            }

            document.getElementById('filtersBar').innerHTML = filtersHtml;

            document.querySelectorAll('[data-filter-artist]').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    state.filteredArtist = state.filteredArtist === btn.dataset.filterArtist ? null : btn.dataset.filterArtist;
                    renderSongsList(state.filteredArtist ? state.songs.filter(s => s.artist === state.filteredArtist) : null);
                    renderReaderAndEditor();
                };
            });

            document.querySelectorAll('[data-filter-tag]').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    state.filteredTag = state.filteredTag === btn.dataset.filterTag ? null : btn.dataset.filterTag;
                    const filtered = state.filteredTag ? state.songs.filter(s => (s.tags || []).includes(state.filteredTag)) : null;
                    renderSongsList(filtered);
                    renderReaderAndEditor();
                };
            });

            const readerContent = document.getElementById('readerContent');
            readerContent.innerHTML = `
                <div class="song-title">${song.title || 'Sin título'}</div>
                <div class="song-artist">${song.artist || ''}</div>
                <div class="song-content" style="font-size: ${state.fontSize}px;">${highlightChords(song.content || '')}</div>
            `;

            const editorContent = document.getElementById('editorContent');
            editorContent.innerHTML = `
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="inputTitle" value="${song.title || ''}" placeholder="Título">
                </div>
                <div class="form-group">
                    <label>Artista</label>
                    <input type="text" id="inputArtist" value="${song.artist || ''}" placeholder="Artista">
                </div>
                <div class="form-group">
                    <label>Etiquetas (separadas por comas)</label>
                    <input type="text" id="inputTags" value="${(song.tags || []).join(', ')}" placeholder="tag1, tag2, tag3">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Contenido</label>
                    <textarea id="inputContent" placeholder="Escribe la letra con acordes...">${song.content || ''}</textarea>
                </div>
                <div class="editor-buttons">
                    <button class="btn btn-primary" id="btnSave">
                        <span class="material-symbols-rounded" style="font-size: 18px;">save</span>
                        Guardar
                    </button>
                    <button class="btn btn-danger" id="btnDelete">
                        <span class="material-symbols-rounded" style="font-size: 18px;">delete</span>
                        Eliminar
                    </button>
                </div>
            `;

            document.getElementById('btnSave').onclick = () => saveSong(song.id);
            document.getElementById('btnDelete').onclick = () => deleteSong(song.id);
        }

        function saveSong(id) {
            const title = document.getElementById('inputTitle').value || 'Sin título';
            const artist = document.getElementById('inputArtist').value || '';
            const content = document.getElementById('inputContent').value || '';
            const tags = document.getElementById('inputTags').value
                .split(',')
                .map(t => t.trim())
                .filter(Boolean);

            set(ref(db, `songs/${id}`), {
                title,
                artist,
                content,
                tags,
                updatedAt: new Date().toISOString()
            });

            console.log("Guardado:", title);
        }

        function deleteSong(id) {
            if (confirm('Eliminar esta canción?')) {
                remove(ref(db, `songs/${id}`));
                state.currentSongId = null;
            }
        }

        function newSong() {
            const newRef = push(ref(db, 'songs'));
            set(newRef, {
                title: 'Nueva canción',
                artist: '',
                content: 'INTRO\n\n',
                tags: [],
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            }).then(() => {
                selectSong(newRef.key);
            });
        }

        function handleSearch(query) {
            const lower = query.toLowerCase();
            const suggestions = [];

            state.songs.forEach(song => {
                if (song.title.toLowerCase().includes(lower)) {
                    suggestions.push({ type: 'canción', text: song.title, id: song.id });
                }
                if (song.artist && song.artist.toLowerCase().includes(lower)) {
                    if (!suggestions.find(s => s.type === 'artista' && s.text === song.artist)) {
                        suggestions.push({ type: 'artista', text: song.artist, id: song.artist });
                    }
                }
            });

            const suggestionsEl = document.getElementById('searchSuggestions');
            if (suggestions.length === 0) {
                suggestionsEl.classList.remove('active');
                return;
            }

            suggestionsEl.innerHTML = suggestions.map(s => `
                <div class="suggestion-item" data-id="${s.id}" data-type="${s.type}">
                    <div>${s.text}</div>
                    <div class="suggestion-type">${s.type}</div>
                </div>
            `).join('');
            suggestionsEl.classList.add('active');

            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.onclick = () => {
                    if (item.dataset.type === 'canción') {
                        selectSong(item.dataset.id);
                    } else if (item.dataset.type === 'artista') {
                        const song = state.songs.find(s => s.artist === item.dataset.id);
                        if (song) selectSong(song.id);
                    }
                    document.getElementById('searchBox').value = '';
                    suggestionsEl.classList.remove('active');
                };
            });
        }

        // INICIALIZAR
        document.getElementById('toggleDark').addEventListener('click', () => {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('dark', state.darkMode);
            localStorage.setItem('darkMode', state.darkMode);
        });

        document.getElementById('btnNew').addEventListener('click', newSong);

        document.getElementById('searchBox').addEventListener('input', (e) => {
            if (e.target.value.length > 0) {
                handleSearch(e.target.value);
            } else {
                document.getElementById('searchSuggestions').classList.remove('active');
                renderSongsList();
            }
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(tab.dataset.view + 'View').classList.add('active');
            });
        });

        document.getElementById('decreaseFont').addEventListener('click', () => {
            state.fontSize = Math.max(12, state.fontSize - 1);
            document.getElementById('fontSize').value = state.fontSize;
            renderReaderAndEditor();
        });

        document.getElementById('increaseFont').addEventListener('click', () => {
            state.fontSize = Math.min(32, state.fontSize + 1);
            document.getElementById('fontSize').value = state.fontSize;
            renderReaderAndEditor();
        });

        document.getElementById('fontSize').addEventListener('input', (e) => {
            state.fontSize = Math.max(12, Math.min(32, parseInt(e.target.value) || 16));
            renderReaderAndEditor();
        });

        if (state.darkMode) {
            document.body.classList.add('dark');
        }

        loadSongs();
    </script>
</body>
</html>
